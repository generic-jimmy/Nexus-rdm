version: "3.9"

# Local development
# Run: docker compose up -d
# Panel: http://localhost:4000

services:
  app:
    build: .
    container_name: nexus_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    volumes:
      # SQLite database lives here — persists across restarts and rebuilds
      - nexus_data:/data

volumes:
  nexus_data:
